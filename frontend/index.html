<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeetCode Stats Tracker | Real-time Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            animation: fadeIn 0.6s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header */
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* Card */
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 30px;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* Input Group */
        .input-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .input-field {
            flex: 1;
            min-width: 200px;
        }

        .input-field label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .input-field input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .input-field input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* Button */
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 28px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            transition: all 0.3s ease;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stat-card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .stat-card.easy {
            background: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%);
            color: white;
        }

        .stat-card.medium {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            color: white;
        }

        .stat-card.hard {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .stat-card.total {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .stat-card.ranking {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 10px 0;
        }

        .stat-label {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        /* User Info */
        .user-info {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            color: white;
            margin-bottom: 20px;
        }

        .user-info h2 {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .user-info p {
            opacity: 0.9;
        }

        /* Loading Spinner */
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Error Message */
        .error-message {
            background: #ff4757;
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-top: 20px;
            display: none;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* Result Section */
        .result-section {
            display: none;
        }

        .result-section.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .input-group {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
        }

        /* Footer */
        .footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏆 LeetCode Stats Tracker</h1>
            <p>Track your coding progress in real-time</p>
        </div>

        <div class="card">
            <div class="input-group">
                <div class="input-field">
                    <label>📧 Email (Optional)</label>
                    <input type="email" id="email" placeholder="your@email.com">
                </div>
                <div class="input-field">
                    <label>👤 LeetCode Username</label>
                    <input type="text" id="username" placeholder="Enter your username">
                </div>
                <button class="btn" onclick="fetchStats()">
                    🚀 Get Stats
                </button>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 15px; color: white;">Fetching your stats...</p>
        </div>

        <div id="error" class="error-message"></div>

        <div id="result" class="result-section">
            <div class="user-info" id="userInfo">
                <h2 id="name">Loading...</h2>
                <p id="userEmail"></p>
            </div>

            <div class="stats-grid" id="statsGrid">
                <!-- Stats will be inserted here -->
            </div>
        </div>

        <div class="footer">
            <p>✨ Real-time data from LeetCode API | Updated instantly</p>
        </div>
    </div>

    <script>
        async function fetchStats() {
            const email = document.getElementById('email').value;
            const username = document.getElementById('username').value;

            if (!username.trim()) {
                showError('Please enter a LeetCode username! 🎯');
                return;
            }

            // Show loading, hide result and error
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').classList.remove('active');
            document.getElementById('error').style.display = 'none';

            try {
                const response = await fetch('http://127.0.0.1:5000/get_stats', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        username: username.trim()
                    })
                });

                const data = await response.json();

                if (data.error) {
                    showError(data.error);
                    return;
                }

                // Display results
                displayResults(data);
                
            } catch (error) {
                console.error('Error:', error);
                showError('Failed to connect to server. Make sure Flask is running on port 5000! 🔌');
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function displayResults(data) {
            // Update user info
            document.getElementById('name').innerHTML = `👨‍💻 ${data.username}`;
            if (data.email && data.email !== "Not provided") {
                document.getElementById('userEmail').innerHTML = `📧 ${data.email}`;
            } else {
                document.getElementById('userEmail').innerHTML = '🎯 LeetCode Warrior';
            }

            // Create stats cards
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = `
                <div class="stat-card total" style="animation-delay: 0.1s">
                    <div class="stat-label">Total Solved</div>
                    <div class="stat-number">${data.totalSolved}</div>
                    <div class="stat-label">Problems</div>
                </div>
                <div class="stat-card easy" style="animation-delay: 0.2s">
                    <div class="stat-label">Easy</div>
                    <div class="stat-number">${data.easySolved}</div>
                    <div class="stat-label">✅ Completed</div>
                </div>
                <div class="stat-card medium" style="animation-delay: 0.3s">
                    <div class="stat-label">Medium</div>
                    <div class="stat-number">${data.mediumSolved}</div>
                    <div class="stat-label">⚡ Completed</div>
                </div>
                <div class="stat-card hard" style="animation-delay: 0.4s">
                    <div class="stat-label">Hard</div>
                    <div class="stat-number">${data.hardSolved}</div>
                    <div class="stat-label">🔥 Completed</div>
                </div>
                <div class="stat-card ranking" style="animation-delay: 0.5s">
                    <div class="stat-label">Global Ranking</div>
                    <div class="stat-number">${formatRanking(data.ranking)}</div>
                    <div class="stat-label">Worldwide</div>
                </div>
            `;

            // Show result section
            document.getElementById('result').classList.add('active');

            // Add confetti effect if user has solved many problems
            if (data.totalSolved > 500) {
                createConfetti();
            }
        }

        function formatRanking(ranking) {
            if (ranking === "N/A" || !ranking) return "🏅 Top Coder";
            if (typeof ranking === 'number') {
                if (ranking < 1000) return `#${ranking}`;
                if (ranking < 10000) return `#${(ranking/1000).toFixed(1)}K`;
                return `#${(ranking/1000).toFixed(0)}K`;
            }
            return ranking;
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            
            // Hide result
            document.getElementById('result').classList.remove('active');
            
            // Auto-hide after 5 seconds
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        function createConfetti() {
            // Simple confetti effect for achievements
            const colors = ['#667eea', '#764ba2', '#a8e063', '#f6d365', '#f093fb'];
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.style.position = 'fixed';
                confetti.style.width = '10px';
                confetti.style.height = '10px';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.top = '-10px';
                confetti.style.pointerEvents = 'none';
                confetti.style.zIndex = '9999';
                document.body.appendChild(confetti);
                
                const animation = confetti.animate([
                    { transform: `translateY(0) rotate(0deg)`, opacity: 1 },
                    { transform: `translateY(${window.innerHeight}px) rotate(${Math.random() * 360}deg)`, opacity: 0 }
                ], {
                    duration: Math.random() * 2000 + 1000,
                    easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
                });
                
                animation.onfinish = () => confetti.remove();
            }
        }

        // Add enter key support
        document.getElementById('username').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                fetchStats();
            }
        });

        // Auto-focus on username input
        document.getElementById('username').focus();
    </script>
</body>
</html>
