<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeetCode Stats Tracker | Real-time Dashboard</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #d27492 0%, #dc2254 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 3rem;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .input-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .input-field {
            flex: 1;
            min-width: 220px;
        }

        .input-field label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .input-field input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 2px solid #ddd;
            font-size: 1rem;
        }

        .btn {
            background: linear-gradient(135deg, #e879ab 0%, #ea3e80 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 28px;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .loading {
            display: none;
            text-align: center;
            color: white;
            margin-top: 20px;
        }

        .error-message {
            background: red;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
            text-align: center;
        }

        .result-section {
            display: none;
        }

        .result-section.active {
            display: block;
        }

        .user-info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .stat-card {
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            color: white;
        }

        .total {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .easy {
            background: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%);
        }

        .medium {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
        }

        .hard {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .ranking {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        .github {
            background: linear-gradient(135deg, #434343 0%, #000000 100%);
        }

        .stat-number {
            font-size: 2.5rem;
            margin: 10px 0;
            font-weight: bold;
        }

        .stat-label {
            font-size: 1rem;
        }

        .footer {
            text-align: center;
            color: white;
            margin-top: 30px;
        }

        @media(max-width: 768px) {
            .input-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>🏆 Developer Dashboard</h1>
        <p>Track LeetCode + GitHub Progress</p>
    </div>

    <div class="card">

        <div class="input-group">

            <div class="input-field">
                <label>📧 Email</label>
                <input type="email" id="email" placeholder="your@email.com">
            </div>

            <div class="input-field">
                <label>👤 LeetCode Username</label>
                <input type="text" id="username" placeholder="LeetCode Username">
            </div>

            <div class="input-field">
                <label>🐙 GitHub Username</label>
                <input type="text" id="github" placeholder="GitHub Username">
            </div>

            <button class="btn" onclick="fetchStats()">
                🚀 Get Stats
            </button>

        </div>

    </div>

    <div class="loading" id="loading">
        <h2>Loading stats...</h2>
    </div>

    <div class="error-message" id="error"></div>

    <div class="result-section" id="result">

        <div class="user-info">
            <h2 id="name">Username</h2>
            <p id="userEmail"></p>
        </div>

        <div class="stats-grid" id="statsGrid"></div>

    </div>

    <div class="footer">
        ✨ Real-time LeetCode + GitHub Dashboard
    </div>

</div>

<script>

async function fetchStats() {

    const email = document.getElementById('email').value;
    const username = document.getElementById('username').value;
    const github = document.getElementById('github').value;

    if (!username.trim()) {
        showError("Please enter LeetCode username!");
        return;
    }

    document.getElementById('loading').style.display = 'block';
    document.getElementById('result').classList.remove('active');
    document.getElementById('error').style.display = 'none';

    try {

        const response = await fetch('http://127.0.0.1:5000/get_stats', {

            method: 'POST',

            headers: {
                'Content-Type': 'application/json'
            },

            body: JSON.stringify({
                email: email,
                username: username.trim(),
                github: github.trim()
            })

        });

        const data = await response.json();

        if (data.error) {
            showError(data.error);
            return;
        }

        displayResults(data);

    } catch (error) {

        console.error(error);

        showError("Failed to connect to Flask backend!");

    } finally {

        document.getElementById('loading').style.display = 'none';

    }

}

function displayResults(data) {

    document.getElementById('name').innerHTML =
    `👨‍💻 ${data.username}`;

    document.getElementById('userEmail').innerHTML =
    `📧 ${data.email}`;

    const statsGrid = document.getElementById('statsGrid');

    statsGrid.innerHTML = `

        <div class="stat-card total">
            <div class="stat-label">Total Solved</div>
            <div class="stat-number">${data.totalSolved}</div>
        </div>

        <div class="stat-card easy">
            <div class="stat-label">Easy</div>
            <div class="stat-number">${data.easySolved}</div>
        </div>

        <div class="stat-card medium">
            <div class="stat-label">Medium</div>
            <div class="stat-number">${data.mediumSolved}</div>
        </div>

        <div class="stat-card hard">
            <div class="stat-label">Hard</div>
            <div class="stat-number">${data.hardSolved}</div>
        </div>

        <div class="stat-card ranking">
            <div class="stat-label">Ranking</div>
            <div class="stat-number">${data.ranking}</div>
        </div>

        <div class="stat-card github">
            <div class="stat-label">GitHub Projects</div>
            <div class="stat-number">${data.githubRepos || 0}</div>
        </div>

    `;

    document.getElementById('result').classList.add('active');

}

function showError(message) {

    const errorDiv = document.getElementById('error');

    errorDiv.innerText = message;

    errorDiv.style.display = 'block';

}

document.getElementById('username').addEventListener('keypress', (e) => {

    if (e.key === 'Enter') {
        fetchStats();
    }

});

</script>

</body>
</html>
